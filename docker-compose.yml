services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nocko_mdm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdm -d nocko_mdm"]
      interval: 5s
      timeout: 5s
      retries: 10

  emqx:
    image: emqx/emqx:5.8.6
    restart: unless-stopped
    environment:
      EMQX_NAME: nocko_mdm
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__USER_ID_TYPE: username
      EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__NAME: plain
      EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__SALT_POSITION: disable
      EMQX_DASHBOARD__DEFAULT_PASSWORD: "${EMQX_DASHBOARD_PASSWORD:-changeme}"
    ports:
      - "127.0.0.1:8083:8083"
      - "127.0.0.1:18083:18083"
    volumes:
      - emqxdata:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  emqx-setup:
    image: curlimages/curl:8.7.1
    restart: "no"
    depends_on:
      emqx:
        condition: service_healthy
    environment:
      EMQX_DASHBOARD_PASSWORD: "${EMQX_DASHBOARD_PASSWORD:-changeme}"
      MQTT_USERNAME: "${MQTT_USERNAME:-nocko}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-nocko_mqtt_secret}"
    entrypoint:
      - sh
      - -c
      - |
        curl -sf -X POST http://emqx:18083/api/v5/authentication/password_based:built_in_database/users \
          -H "Content-Type: application/json" \
          -u "admin:${EMQX_DASHBOARD_PASSWORD}" \
          -d "{\"user_id\": \"${MQTT_USERNAME}\", \"password\": \"${MQTT_PASSWORD}\", \"is_superuser\": true}" \
          && echo "MQTT user created." \
          || echo "User may already exist."

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mdm:${POSTGRES_PASSWORD}@postgres:5432/nocko_mdm
      MDM_SERVER_URL: ${MDM_SERVER_URL:-https://mdm.nocko.com}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nocko.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MQTT_HOST: emqx
      MQTT_PORT: "8083"
      MQTT_TRANSPORT: websockets
      MQTT_PATH: /mqtt
      MQTT_USERNAME: "${MQTT_USERNAME:-nocko}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-nocko_mqtt_secret}"
      MQTT_PUBLIC_TRANSPORT: ${MQTT_PUBLIC_TRANSPORT:-websockets}
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
    volumes:
      - agent_cache:/tmp/nocko_agent_cache
    ports:
      - "8000:8000"
    command: >
      sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ""
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  agent_cache:
  emqxdata:

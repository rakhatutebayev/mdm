version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mdm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdmpassword}
      POSTGRES_DB: nocko_mdm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdm -d nocko_mdm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mdm:${POSTGRES_PASSWORD:-mdmpassword}@postgres:5432/nocko_mdm
      MDM_SERVER_URL: ${MDM_SERVER_URL:-https://mdm.nocko.com}
      MQTT_HOST: ${MQTT_HOST:-localhost}
      MQTT_PORT: ${MQTT_PORT:-1883}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3002:3000"

volumes:
  pgdata:

zabbix_export:
  version: '6.0'
  date: '2024-01-01T00:00:00Z'
  groups:
    - uuid: 7df96b18c230490a9a0a9e2307226339
      name: Templates/Hardware
  templates:
    - uuid: bf3c82d1e9f04d7cb8e2345678901bcd
      template: 'Dell iDRAC6 by SNMP'
      name: 'Dell iDRAC6 by SNMP'
      description: |
        Full hardware inventory and health monitoring for Dell PowerEdge servers
        via iDRAC6 integrated BMC SNMP agent.
        Compatible: iDRAC6 (11th gen R710/R610/R510), iDRAC7 (12th gen R720/R620)
        NOT compatible with iDRAC8/9 — use Dell iDRAC SNMP v2 template for those.

        Covers:
          - Server identity: model, Service Tag, BIOS version
          - CPU: count, model, speed, core/thread count, status
          - Memory: per-DIMM slot, size, type, speed, manufacturer, part#
          - Storage: per physical disk (bay, model, state, capacity)
          - RAID: virtual disk arrays (RAID level, size, state)
          - Power supplies: count, status, rated wattage
          - Fans: RPM, status per fan
          - Temperature: per sensor, thresholds
          - Power consumption: system power draw (if sensor available)

        MIB: DELL-MIB enterprise 1.3.6.1.4.1.674.10892.1
        Tested: iDRAC6 (11th gen) — R710, R610, R510
        SNMP: v2c, community 'public' (configure in iDRAC web UI)

        iDRAC SNMP setup:
          iDRAC Web → Network/Security → Network → SNMP → Enable
          Set Community Name, set Trap destination if needed

      groups:
        - name: Templates/Hardware

      items:
        # ── Probe item (iDRAC6/7 compatible) ─────────────────────────────────
        # sysUpTime is the probe OID — confirmed available on iDRAC6 (MIB-II)
        - uuid: e1000001000000000000000000000000
          name: 'SNMP agent uptime'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: dellSnmpUptime
          delay: 60s
          units: uptime
          description: 'MIB-II sysUpTime — used as probe OID and connectivity check'
          tags:
            - tag: Application
              value: Identity

        # ── Server Identity ───────────────────────────────────────────────────
        - uuid: e1000001000000000000000000000001
          name: 'Server model'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.674.10892.1.300.10.1.9.1
          key: dellSysModelName
          delay: '86400'
          value_type: TEXT
          description: 'Dell chassis model name, e.g. PowerEdge R710. iDRAC6/7 compatible.'
          tags:
            - tag: Application
              value: Identity

        - uuid: e1000001000000000000000000000002
          name: 'Service Tag (serial number)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.674.10892.1.300.10.1.11.1
          key: dellSysServiceTag
          delay: '86400'
          value_type: TEXT
          description: 'Dell 7-character Service Tag = serial number'
          tags:
            - tag: Application
              value: Identity

        - uuid: e1000001000000000000000000000003
          name: 'BIOS version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.674.10892.1.300.50.1.7.1.1
          key: dellBIOSVersion
          delay: '86400'
          value_type: TEXT
          tags:
            - tag: Application
              value: Identity

        - uuid: e1000001000000000000000000000004
          name: 'Asset tag'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.674.10892.1.300.10.1.13.1
          key: dellSysAssetTag
          delay: '86400'
          value_type: TEXT
          tags:
            - tag: Application
              value: Identity

        - uuid: e1000001000000000000000000000005
          name: 'System overall status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.674.10892.1.300.10.1.24.1
          key: dellSysPrimaryStatus
          delay: '3600'
          description: |
            Overall system health rollup (iDRAC7+ only, may return NoSuchOID on iDRAC6):
            1=other 2=unknown 3=ok 4=nonCritical 5=critical 6=nonRecoverable
          tags:
            - tag: Application
              value: Identity
          triggers:
            - uuid: tr000001000000000000000000000001
              expression: 'last(/Dell iDRAC6 by SNMP/dellSysPrimaryStatus)>=5'
              name: '{HOST.NAME}: system status CRITICAL'
              priority: HIGH

        - uuid: e1000001000000000000000000000006
          name: 'iDRAC firmware version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.674.10892.1.300.10.1.10.1
          key: dellFirmwareVersion
          delay: '86400'
          value_type: TEXT
          tags:
            - tag: Application
              value: Identity

      discovery_rules:
        # ── CPUs ──────────────────────────────────────────────────────────────
        - uuid: dr000001000000000000000000000001
          name: 'CPU discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#CPU.NAME},1.3.6.1.4.1.674.10892.1.1100.30.1.9]'
          key: dellCpuDiscovery
          delay: '3600'
          description: 'Discover physical CPU sockets via Dell processorTable'
          item_prototypes:
            - uuid: ip000001000000000000000000000001
              name: 'CPU {#SNMPINDEX}: brand/model'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.30.1.9.{#SNMPINDEX}'
              key: 'dellCpuBrand[{#SNMPINDEX}]'
              delay: '86400'
              value_type: TEXT
              description: 'CPU brand string, e.g. Intel(R) Xeon(R) CPU E5-2650'
              tags:
                - tag: Application
                  value: CPU

            - uuid: ip000001000000000000000000000002
              name: 'CPU {#SNMPINDEX}: current speed (MHz)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.30.1.12.{#SNMPINDEX}'
              key: 'dellCpuCurrentSpeed[{#SNMPINDEX}]'
              delay: '3600'
              units: MHz
              tags:
                - tag: Application
                  value: CPU

            - uuid: ip000001000000000000000000000003
              name: 'CPU {#SNMPINDEX}: core count'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.30.1.17.{#SNMPINDEX}'
              key: 'dellCpuCores[{#SNMPINDEX}]'
              delay: '86400'
              description: 'Number of physical cores'
              tags:
                - tag: Application
                  value: CPU

            - uuid: ip000001000000000000000000000004
              name: 'CPU {#SNMPINDEX}: thread count'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.30.1.20.{#SNMPINDEX}'
              key: 'dellCpuThreads[{#SNMPINDEX}]'
              delay: '86400'
              description: 'Number of logical threads (cores x HT)'
              tags:
                - tag: Application
                  value: CPU

            - uuid: ip000001000000000000000000000005
              name: 'CPU {#SNMPINDEX}: status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.30.1.5.{#SNMPINDEX}'
              key: 'dellCpuStatus[{#SNMPINDEX}]'
              delay: 60s
              description: '1=other 2=unknown 3=ok 4=nonCritical 5=critical 6=nonRecoverable'
              tags:
                - tag: Application
                  value: CPU
              trigger_prototypes:
                - uuid: tp000001000000000000000000000001
                  expression: 'last(/Dell iDRAC6 by SNMP/dellCpuStatus[{#SNMPINDEX}])>=5'
                  name: '{HOST.NAME}: CPU {#SNMPINDEX} status critical'
                  priority: HIGH

            - uuid: ip000001000000000000000000000006
              name: 'CPU {#SNMPINDEX}: socket location'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.30.1.23.{#SNMPINDEX}'
              key: 'dellCpuSocket[{#SNMPINDEX}]'
              delay: '86400'
              value_type: TEXT
              description: 'Physical socket name, e.g. CPU1'
              tags:
                - tag: Application
                  value: CPU

        # ── Memory DIMMs ───────────────────────────────────────────────────────
        - uuid: dr000002000000000000000000000001
          name: 'Memory DIMM discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#MEM.LOCATION},1.3.6.1.4.1.674.10892.1.1100.52.1.8]'
          key: dellMemoryDiscovery
          delay: '3600'
          description: |
            Discover populated memory slots via Dell memoryDeviceTable.
            Returns only installed DIMMs (empty slots return no value).
          item_prototypes:
            - uuid: ip000002000000000000000000000001
              name: 'DIMM {#MEM.LOCATION}: size'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.52.1.14.{#SNMPINDEX}'
              key: 'dellMemSize[{#SNMPINDEX}]'
              delay: '86400'
              units: KB
              description: 'DIMM capacity in KB'
              tags:
                - tag: Application
                  value: Memory

            - uuid: ip000002000000000000000000000002
              name: 'DIMM {#MEM.LOCATION}: speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.52.1.15.{#SNMPINDEX}'
              key: 'dellMemSpeed[{#SNMPINDEX}]'
              delay: '86400'
              units: MHz
              description: 'DIMM operating frequency in MHz'
              tags:
                - tag: Application
                  value: Memory

            - uuid: ip000002000000000000000000000003
              name: 'DIMM {#MEM.LOCATION}: type'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.52.1.7.{#SNMPINDEX}'
              key: 'dellMemType[{#SNMPINDEX}]'
              delay: '86400'
              description: |
                Memory type code:
                1=other 2=unknown 6=DRAM 7=EDRAM 8=VRAM 9=SRAM 10=RAM
                11=ROM 18=DDR 19=DDR2 20=DDR2_SDRAM 24=DDR3 25=FBD2
                26=DDR3 34=LPDDR3 35=DDR4 36=LPDDR4
              tags:
                - tag: Application
                  value: Memory

            - uuid: ip000002000000000000000000000004
              name: 'DIMM {#MEM.LOCATION}: manufacturer'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.52.1.21.{#SNMPINDEX}'
              key: 'dellMemManufacturer[{#SNMPINDEX}]'
              delay: '86400'
              value_type: TEXT
              description: 'DIMM manufacturer, e.g. Samsung, Hynix, Micron'
              tags:
                - tag: Application
                  value: Memory

            - uuid: ip000002000000000000000000000005
              name: 'DIMM {#MEM.LOCATION}: part number'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.52.1.22.{#SNMPINDEX}'
              key: 'dellMemPartNumber[{#SNMPINDEX}]'
              delay: '86400'
              value_type: TEXT
              tags:
                - tag: Application
                  value: Memory

            - uuid: ip000002000000000000000000000006
              name: 'DIMM {#MEM.LOCATION}: status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.52.1.5.{#SNMPINDEX}'
              key: 'dellMemStatus[{#SNMPINDEX}]'
              delay: 60s
              description: '1=other 2=unknown 3=ok 4=nonCritical 5=critical 6=nonRecoverable'
              tags:
                - tag: Application
                  value: Memory
              trigger_prototypes:
                - uuid: tp000002000000000000000000000001
                  expression: 'last(/Dell iDRAC6 by SNMP/dellMemStatus[{#SNMPINDEX}])>=5'
                  name: '{HOST.NAME}: DIMM {#MEM.LOCATION} failed'
                  priority: DISASTER

            - uuid: ip000002000000000000000000000007
              name: 'DIMM {#MEM.LOCATION}: bank/channel'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.1100.52.1.9.{#SNMPINDEX}'
              key: 'dellMemBank[{#SNMPINDEX}]'
              delay: '86400'
              value_type: TEXT
              description: 'Memory channel/bank label, e.g. A, B'
              tags:
                - tag: Application
                  value: Memory

        # ── Physical Disks ────────────────────────────────────────────────────
        - uuid: dr000003000000000000000000000001
          name: 'Physical disk discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DISK.NAME},1.3.6.1.4.1.674.10892.1.130.4.1.2]'
          key: dellDiskDiscovery
          delay: '3600'
          description: |
            Discover physical disks via Dell physicalDiskTable.
            Covers all disks visible to PERC RAID controller.
          item_prototypes:
            - uuid: ip000003000000000000000000000001
              name: 'Disk {#DISK.NAME}: state'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.4.1.4.{#SNMPINDEX}'
              key: 'dellDiskState[{#SNMPINDEX}]'
              delay: 60s
              description: |
                1=ready 2=failed 3=online 4=offline
                6=degraded 7=recovering 11=removed
                15=foreign 24=unsupported 25=diagnosingMedia
                26=predictiveFailure 35=rebuilding
              tags:
                - tag: Application
                  value: 'Physical Disks'
              trigger_prototypes:
                - uuid: tp000003000000000000000000000001
                  expression: 'last(/Dell iDRAC6 by SNMP/dellDiskState[{#SNMPINDEX}])=2'
                  name: '{HOST.NAME}: disk {#DISK.NAME} FAILED'
                  priority: DISASTER
                - uuid: tp000003000000000000000000000002
                  expression: 'last(/Dell iDRAC6 by SNMP/dellDiskState[{#SNMPINDEX}])=26'
                  name: '{HOST.NAME}: disk {#DISK.NAME} predictive failure (SMART warning)'
                  priority: HIGH
                - uuid: tp000003000000000000000000000003
                  expression: 'last(/Dell iDRAC6 by SNMP/dellDiskState[{#SNMPINDEX}])=35'
                  name: '{HOST.NAME}: disk {#DISK.NAME} rebuilding'
                  priority: WARNING

            - uuid: ip000003000000000000000000000002
              name: 'Disk {#DISK.NAME}: model'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.4.1.6.{#SNMPINDEX}'
              key: 'dellDiskModel[{#SNMPINDEX}]'
              delay: '3600'
              value_type: TEXT
              description: 'Disk model/product ID'
              tags:
                - tag: Application
                  value: 'Physical Disks'

            - uuid: ip000003000000000000000000000003
              name: 'Disk {#DISK.NAME}: capacity (MB)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.4.1.11.{#SNMPINDEX}'
              key: 'dellDiskCapacity[{#SNMPINDEX}]'
              delay: '3600'
              units: MB
              tags:
                - tag: Application
                  value: 'Physical Disks'

            - uuid: ip000003000000000000000000000004
              name: 'Disk {#DISK.NAME}: media type'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.4.1.35.{#SNMPINDEX}'
              key: 'dellDiskMediaType[{#SNMPINDEX}]'
              delay: '3600'
              description: '1=unknown 2=SSD 3=SAS 4=SATA'
              tags:
                - tag: Application
                  value: 'Physical Disks'

            - uuid: ip000003000000000000000000000005
              name: 'Disk {#DISK.NAME}: bay'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.4.1.9.{#SNMPINDEX}'
              key: 'dellDiskBay[{#SNMPINDEX}]'
              delay: '3600'
              description: 'Physical disk bay number in the enclosure'
              tags:
                - tag: Application
                  value: 'Physical Disks'

            - uuid: ip000003000000000000000000000006
              name: 'Disk {#DISK.NAME}: serial number'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.4.1.7.{#SNMPINDEX}'
              key: 'dellDiskSerial[{#SNMPINDEX}]'
              delay: '86400'
              value_type: TEXT
              tags:
                - tag: Application
                  value: 'Physical Disks'

        # ── RAID (Virtual Disks) ───────────────────────────────────────────────
        - uuid: dr000004000000000000000000000001
          name: 'RAID virtual disk discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#VDISK.NAME},1.3.6.1.4.1.674.10892.1.130.3.1.2]'
          key: dellVDiskDiscovery
          delay: '3600'
          description: 'Discover RAID arrays (virtual disks) from PERC controller'
          item_prototypes:
            - uuid: ip000004000000000000000000000001
              name: 'RAID {#VDISK.NAME}: state'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.3.1.4.{#SNMPINDEX}'
              key: 'dellVDiskState[{#SNMPINDEX}]'
              delay: 60s
              description: |
                1=ready 2=failed 3=online 4=offline
                6=degraded 15=foreign 24=unsupported 35=rebuilding
              tags:
                - tag: Application
                  value: RAID
              trigger_prototypes:
                - uuid: tp000004000000000000000000000001
                  expression: 'last(/Dell iDRAC6 by SNMP/dellVDiskState[{#SNMPINDEX}])=6'
                  name: '{HOST.NAME}: RAID {#VDISK.NAME} DEGRADED — disk lost!'
                  priority: DISASTER
                - uuid: tp000004000000000000000000000002
                  expression: 'last(/Dell iDRAC6 by SNMP/dellVDiskState[{#SNMPINDEX}])=2'
                  name: '{HOST.NAME}: RAID {#VDISK.NAME} FAILED'
                  priority: DISASTER

            - uuid: ip000004000000000000000000000002
              name: 'RAID {#VDISK.NAME}: layout (RAID level)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.3.1.13.{#SNMPINDEX}'
              key: 'dellVDiskLayout[{#SNMPINDEX}]'
              delay: '3600'
              description: |
                RAID layout bitmask:
                2=RAID0  4=RAID1  8=RAID5  64=RAID6
                128=RAID10  2048=RAID50  8192=RAID60
              tags:
                - tag: Application
                  value: RAID

            - uuid: ip000004000000000000000000000003
              name: 'RAID {#VDISK.NAME}: size (MB)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.3.1.14.{#SNMPINDEX}'
              key: 'dellVDiskSize[{#SNMPINDEX}]'
              delay: '3600'
              units: MB
              tags:
                - tag: Application
                  value: RAID

            - uuid: ip000004000000000000000000000004
              name: 'RAID {#VDISK.NAME}: write policy'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.130.3.1.10.{#SNMPINDEX}'
              key: 'dellVDiskWritePolicy[{#SNMPINDEX}]'
              delay: '3600'
              description: '1=writeThrough 2=writeBack 3=writeBackForced'
              tags:
                - tag: Application
                  value: RAID

        # ── Power Supplies ────────────────────────────────────────────────────
        - uuid: dr000005000000000000000000000001
          name: 'Power supply discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#PSU.LOCATION},1.3.6.1.4.1.674.10892.1.600.12.1.8]'
          key: dellPSUDiscovery
          delay: '3600'
          description: 'Discover power supplies via Dell powerSupplyTable'
          item_prototypes:
            - uuid: ip000005000000000000000000000001
              name: 'PSU {#PSU.LOCATION}: status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.600.12.1.5.{#SNMPINDEX}'
              key: 'dellPSUStatus[{#SNMPINDEX}]'
              delay: 60s
              description: |
                1=other 2=unknown 3=ok 4=nonCritical
                5=critical 6=nonRecoverable
              tags:
                - tag: Application
                  value: 'Power Supplies'
              trigger_prototypes:
                - uuid: tp000005000000000000000000000001
                  expression: 'last(/Dell iDRAC6 by SNMP/dellPSUStatus[{#SNMPINDEX}])>=5'
                  name: '{HOST.NAME}: PSU {#PSU.LOCATION} failed'
                  priority: DISASTER
                - uuid: tp000005000000000000000000000002
                  expression: 'last(/Dell iDRAC6 by SNMP/dellPSUStatus[{#SNMPINDEX}])=4'
                  name: '{HOST.NAME}: PSU {#PSU.LOCATION} non-critical (check cable/source)'
                  priority: WARNING

            - uuid: ip000005000000000000000000000002
              name: 'PSU {#PSU.LOCATION}: rated output watts'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.600.12.1.6.{#SNMPINDEX}'
              key: 'dellPSURatedWatts[{#SNMPINDEX}]'
              delay: '3600'
              units: W
              description: 'Maximum rated output wattage of this PSU'
              tags:
                - tag: Application
                  value: 'Power Supplies'

            - uuid: ip000005000000000000000000000003
              name: 'PSU {#PSU.LOCATION}: input voltage (mV)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.600.12.1.9.{#SNMPINDEX}'
              key: 'dellPSUInputVoltage[{#SNMPINDEX}]'
              delay: 60s
              units: mV
              description: 'Measured input voltage in millivolts'
              tags:
                - tag: Application
                  value: 'Power Supplies'

        # ── Fans ─────────────────────────────────────────────────────────────
        - uuid: dr000006000000000000000000000001
          name: 'Fan discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#FAN.LOCATION},1.3.6.1.4.1.674.10892.1.700.12.1.8]'
          key: dellFanDiscovery
          delay: '3600'
          description: 'Discover cooling fans via Dell coolingDeviceTable'
          item_prototypes:
            - uuid: ip000006000000000000000000000001
              name: 'Fan {#FAN.LOCATION}: speed (RPM)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.700.12.1.6.{#SNMPINDEX}'
              key: 'dellFanRPM[{#SNMPINDEX}]'
              delay: 60s
              units: RPM
              tags:
                - tag: Application
                  value: Cooling
              trigger_prototypes:
                - uuid: tp000006000000000000000000000001
                  expression: 'last(/Dell iDRAC6 by SNMP/dellFanRPM[{#SNMPINDEX}])=0'
                  name: '{HOST.NAME}: fan {#FAN.LOCATION} stopped (0 RPM)'
                  priority: HIGH

            - uuid: ip000006000000000000000000000002
              name: 'Fan {#FAN.LOCATION}: status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.700.12.1.5.{#SNMPINDEX}'
              key: 'dellFanStatus[{#SNMPINDEX}]'
              delay: 60s
              description: '1=other 2=unknown 3=ok 4=nonCritical 5=critical 6=nonRecoverable'
              tags:
                - tag: Application
                  value: Cooling
              trigger_prototypes:
                - uuid: tp000006000000000000000000000002
                  expression: 'last(/Dell iDRAC6 by SNMP/dellFanStatus[{#SNMPINDEX}])>=5'
                  name: '{HOST.NAME}: fan {#FAN.LOCATION} critical'
                  priority: HIGH

        # ── Temperature sensors ────────────────────────────────────────────────
        - uuid: dr000007000000000000000000000001
          name: 'Temperature sensor discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#TEMP.LOCATION},1.3.6.1.4.1.674.10892.1.700.20.1.8]'
          key: dellTempDiscovery
          delay: '3600'
          description: 'Discover temperature sensors (CPU, inlet, chipset, etc.)'
          item_prototypes:
            - uuid: ip000007000000000000000000000001
              name: 'Temp {#TEMP.LOCATION}: reading'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.700.20.1.6.{#SNMPINDEX}'
              key: 'dellTempReading[{#SNMPINDEX}]'
              delay: 60s
              units: C
              description: 'Temperature sensor reading in Celsius'
              tags:
                - tag: Application
                  value: Temperature
              trigger_prototypes:
                - uuid: tp000007000000000000000000000001
                  expression: 'last(/Dell iDRAC6 by SNMP/dellTempReading[{#SNMPINDEX}])>45'
                  name: '{HOST.NAME}: {#TEMP.LOCATION} temperature high (>45C)'
                  priority: WARNING

            - uuid: ip000007000000000000000000000002
              name: 'Temp {#TEMP.LOCATION}: status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.674.10892.1.700.20.1.5.{#SNMPINDEX}'
              key: 'dellTempStatus[{#SNMPINDEX}]'
              delay: 60s
              tags:
                - tag: Application
                  value: Temperature
              trigger_prototypes:
                - uuid: tp000007000000000000000000000002

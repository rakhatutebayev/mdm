# Nginx config snippet for MQTT over WebSocket (WSS)
# Copy to /etc/nginx/conf.d/mdm-mqtt.conf on the server
# Then: nginx -t && nginx -s reload

# Add this location block inside your existing server { } block for mdm.nocko.com
# (The SSL certificate and other settings are already in your main nginx config)

# ─── PASTE THIS INSIDE your existing server { ... } BLOCK ─────────────────────

location /mqtt {
    proxy_pass         http://127.0.0.1:8083/mqtt;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_read_timeout 86400s;     # keep WebSocket alive (24h)
    proxy_send_timeout 86400s;
}

# ──────────────────────────────────────────────────────────────────────────────

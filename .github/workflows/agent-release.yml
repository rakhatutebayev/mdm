name: Build Windows Agent Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Agent version to release, for example 1.0.0
        required: true
      publish_release:
        description: Publish a GitHub release
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: windows-latest
    env:
      AGENT_DIR: agent-gui
      RELEASE_DIR: release-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate agent sources exist
        shell: pwsh
        run: |
          $required = @(
            "${env:AGENT_DIR}\main.py",
            "${env:AGENT_DIR}\agent.spec",
            "${env:AGENT_DIR}\make_icons.py"
          )
          $missing = @($required | Where-Object { -not (Test-Path $_) })
          if ($missing.Count -gt 0) {
            Write-Error "Agent source files are missing from the repository:`n$($missing -join "`n")"
            exit 1
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywin32 wmi PyQt6 psutil requests pillow

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install WiX Toolset
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Prepare release directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${env:RELEASE_DIR}" | Out-Null

      - name: Build standalone agent executable
        shell: pwsh
        working-directory: agent-gui
        run: |
          python make_icons.py
          pyinstaller agent.spec --noconfirm
          $builtExe = Join-Path $PWD "dist\NOCKO-Agent.exe"
          if (-not (Test-Path $builtExe)) {
            Write-Error "PyInstaller did not produce dist\NOCKO-Agent.exe"
            exit 1
          }
          Copy-Item $builtExe "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64-portable.exe"

      - name: Build EXE installer with Inno Setup
        shell: pwsh
        working-directory: agent-gui
        run: |
          if (-not (Test-Path "installer\setup.iss")) {
            Write-Error "installer\setup.iss is missing. Cannot build setup EXE."
            exit 1
          }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\setup.iss"
          $setupExe = Get-ChildItem "installer\Output\*.exe" | Select-Object -First 1
          if (-not $setupExe) {
            Write-Error "Inno Setup did not produce an installer EXE."
            exit 1
          }
          Copy-Item $setupExe.FullName "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64-setup.exe"

      - name: Build MSI installer with WiX if source exists
        shell: pwsh
        working-directory: agent-gui
        run: |
          $candidate = Get-ChildItem -Recurse -Include *.wxs,*.wixproj | Select-Object -First 1
          if (-not $candidate) {
            Write-Host "No WiX project found. Skipping MSI build."
            exit 0
          }

          if ($candidate.Extension -eq ".wixproj") {
            dotnet build $candidate.FullName -c Release
            $msi = Get-ChildItem -Recurse -Filter *.msi | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          } else {
            try {
              wix build $candidate.FullName -bindpath $PWD -arch x64 -o "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64.msi"
              $msi = Get-Item "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64.msi"
            } catch {
              Write-Warning "WiX MSI build failed. Continuing because single-file EXE is the primary delivery path."
              exit 0
            }
          }

          if (-not $msi) {
            Write-Error "WiX build did not produce an MSI."
            exit 1
          }

          if ($msi.DirectoryName -ne (Resolve-Path "..\${env:RELEASE_DIR}").Path) {
            Copy-Item $msi.FullName "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64.msi"
          }

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem "${env:RELEASE_DIR}"

      - name: Publish GitHub release
        if: ${{ inputs.publish_release == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "agent-v${{ inputs.version }}"
          $assets = Get-ChildItem "${env:RELEASE_DIR}" | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) {
            Write-Error "No release assets were produced."
            exit 1
          }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title "Agent ${{ inputs.version }}" --notes "Windows agent release ${{ inputs.version }}"
          }

      - name: Update agent release manifest
        shell: pwsh
        env:
          REPO: ${{ github.repository }}
        run: |
          $generatedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $tag = "agent-v${{ inputs.version }}"
          $args = @(
            "scripts/update_agent_release_manifest.py",
            "--manifest", "backend/package_builder/agent_releases.json",
            "--repo", $env:REPO,
            "--tag", $tag,
            "--version", "${{ inputs.version }}",
            "--generated-at", $generatedAt
          )

          if (Test-Path "${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64-portable.exe") {
            $args += @("--asset", "exe:x64:${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64-portable.exe")
          }

          if (Test-Path "${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64.msi") {
            $args += @("--asset", "msi:x64:${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64.msi")
          }

          python @args

      - name: Commit updated manifest
        shell: pwsh
        run: |
          if (-not (git diff --quiet -- backend/package_builder/agent_releases.json)) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/package_builder/agent_releases.json
            git commit -m "Update agent release manifest for v${{ inputs.version }}"
            git push
          } else {
            Write-Host "Manifest already up to date."
          }

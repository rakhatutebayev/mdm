name: Build Windows Agent Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Agent version to release, for example 1.0.0
        required: true
      publish_release:
        description: Publish a GitHub release
        required: true
        default: "true"

permissions:
  contents: write
  actions: write

jobs:
  build-agent-windows:
    runs-on: windows-latest
    env:
      AGENT_DIR: agent-gui
      RELEASE_DIR: release-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent-gui/requirements.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-gui/requirements.txt

      - name: Prepare release directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${env:RELEASE_DIR}" | Out-Null

      - name: Build standalone agent executable
        shell: pwsh
        working-directory: agent-gui
        env:
          NOCKO_AGENT_VERSION: ${{ inputs.version }}
        run: |
          python make_icons.py
          pyinstaller agent.spec --noconfirm
          $builtExe = Join-Path $PWD "dist\NOCKO-Agent.exe"
          if (-not (Test-Path $builtExe)) {
            Write-Error "PyInstaller did not produce dist\NOCKO-Agent.exe"
            exit 1
          }
          Copy-Item $builtExe "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64-portable.exe"

      - name: Upload Windows Asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-asset
          path: ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-x64-portable.exe

  build-agent-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Debian/Ubuntu family — glibc 2.31 (ubuntu-20.04 base)
          # Covers: Ubuntu 18.04+, Debian 10+, Linux Mint 20+
          - family: deb
            label: ubuntu2004
            image: ubuntu:20.04
            glibc_min: "2.31"

          # RedHat/CentOS family — glibc 2.17 (CentOS 7 base via manylinux2014)
          # Covers: CentOS 7/8/9, RHEL 7/8/9, AlmaLinux, Rocky Linux, Fedora
          - family: rpm
            label: centos7
            image: quay.io/pypa/manylinux2014_x86_64
            glibc_min: "2.17"

    env:
      RELEASE_DIR: release-assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Linux binary (${{ matrix.family }})
        env:
          NOCKO_AGENT_VERSION: ${{ inputs.version }}
          FAMILY: ${{ matrix.family }}
          LABEL: ${{ matrix.label }}
          IMAGE: ${{ matrix.image }}
        run: |
          mkdir -p ${{ env.RELEASE_DIR }}
          docker run --rm \
            -v "$PWD:/workspace" \
            -e NOCKO_AGENT_VERSION="${NOCKO_AGENT_VERSION}" \
            "${IMAGE}" \
            /bin/bash -c "
              set -e
              # Install Python 3.11 depending on base image
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update -q && apt-get install -y -q python3.11 python3.11-venv python3-pip || true
                PYTHON=python3.11
              elif command -v yum >/dev/null 2>&1; then
                # manylinux2014 already has Python in /opt/python
                PYTHON=/opt/python/cp311-cp311/bin/python
              fi
              \$PYTHON -m pip install --upgrade pip --quiet
              \$PYTHON -m pip install -r /workspace/agent-gui/requirements.txt pyinstaller --quiet
              cd /workspace/agent-gui
              \$PYTHON -m PyInstaller agent.spec --noconfirm --distpath /workspace/${{ env.RELEASE_DIR }}/tmp_dist
              mv /workspace/${{ env.RELEASE_DIR }}/tmp_dist/NOCKO-Agent \
                 /workspace/${{ env.RELEASE_DIR }}/nocko-agent-${NOCKO_AGENT_VERSION}-amd64-linux-${FAMILY}
              chmod +x /workspace/${{ env.RELEASE_DIR }}/nocko-agent-${NOCKO_AGENT_VERSION}-amd64-linux-${FAMILY}
            "

      - name: Show glibc requirement
        run: |
          objdump -p ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux-${{ matrix.family }} \
            | grep GLIBC || true

      - name: Upload Linux Asset (${{ matrix.family }})
        uses: actions/upload-artifact@v4
        with:
          name: linux-asset-${{ matrix.family }}
          path: ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux-${{ matrix.family }}

  publish-release:
    needs: [build-agent-windows, build-agent-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub release
        if: ${{ inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="agent-v${{ inputs.version }}"
          assets=$(find release-assets -type f)
          if [ -z "$assets" ]; then
            echo "No release assets were produced."
            exit 1
          fi

          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --title "Agent ${{ inputs.version }}" \
              --notes "Agent release ${{ inputs.version }}"
          fi

      - name: Update agent release manifest
        env:
          REPO: ${{ github.repository }}
        run: |
          generatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          tag="agent-v${{ inputs.version }}"
          ver="${{ inputs.version }}"

          args=(
            "scripts/update_agent_release_manifest.py"
            "--manifest" "backend/package_builder/agent_releases.json"
            "--repo" "$REPO"
            "--tag" "$tag"
            "--version" "$ver"
            "--generated-at" "$generatedAt"
          )

          [ -f "release-assets/nocko-agent-${ver}-x64-portable.exe" ] && \
            args+=("--asset" "exe:x64:release-assets/nocko-agent-${ver}-x64-portable.exe")

          [ -f "release-assets/nocko-agent-${ver}-amd64-linux-deb" ] && \
            args+=("--asset" "linux-deb:amd64:release-assets/nocko-agent-${ver}-amd64-linux-deb")

          [ -f "release-assets/nocko-agent-${ver}-amd64-linux-rpm" ] && \
            args+=("--asset" "linux-rpm:amd64:release-assets/nocko-agent-${ver}-amd64-linux-rpm")

          python "${args[@]}"

      - name: Commit updated manifest
        run: |
          if ! git diff --quiet -- backend/package_builder/agent_releases.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/package_builder/agent_releases.json
            git commit -m "Update agent release manifest for v${{ inputs.version }}"
            git push
          else
            echo "Manifest already up to date."
          fi

      - name: Trigger portal deploy
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }} --ref main

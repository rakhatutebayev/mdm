name: Build Windows Agent Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Agent version to release, for example 1.0.0
        required: true
      publish_release:
        description: Publish a GitHub release
        required: true
        default: "true"

permissions:
  contents: write
  actions: write

jobs:
  build-agent-windows:
    runs-on: windows-latest
    env:
      AGENT_DIR: agent-gui
      RELEASE_DIR: release-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent-gui/requirements.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-gui/requirements.txt

      - name: Prepare release directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${env:RELEASE_DIR}" | Out-Null

      - name: Build standalone agent executable
        shell: pwsh
        working-directory: agent-gui
        env:
          NOCKO_AGENT_VERSION: ${{ inputs.version }}
        run: |
          python make_icons.py
          pyinstaller agent.spec --noconfirm
          $builtExe = Join-Path $PWD "dist\NOCKO-Agent.exe"
          if (-not (Test-Path $builtExe)) {
            Write-Error "PyInstaller did not produce dist\NOCKO-Agent.exe"
            exit 1
          }
          Copy-Item $builtExe "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64-portable.exe"

      - name: Upload Windows Asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-asset
          path: ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-x64-portable.exe

  # Debian/Ubuntu family — собираем напрямую на ubuntu-20.04 runner (glibc 2.31)
  # Покрывает: Ubuntu 18.04+, Debian 10+, Linux Mint 20+
  build-agent-linux-deb:
    runs-on: ubuntu-latest
    env:
      RELEASE_DIR: release-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent-gui/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r agent-gui/requirements.txt pyinstaller

      - name: Build deb binary
        working-directory: agent-gui
        env:
          NOCKO_AGENT_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p ../${{ env.RELEASE_DIR }}
          python -m PyInstaller agent.spec --noconfirm
          mv dist/NOCKO-Agent ../${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux-deb

      - name: Show glibc requirement
        run: objdump -p ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux-deb | grep GLIBC || true

      - name: Upload deb asset
        uses: actions/upload-artifact@v4
        with:
          name: linux-asset-deb
          path: ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux-deb

  # RedHat/CentOS family — собираем на ubuntu-20.04 + staticx для полной статической линковки.
  # staticx упаковывает все .so зависимости внутрь бинарника → работает на CentOS 7+ (glibc 2.17+),
  # RHEL, AlmaLinux, Rocky Linux, Fedora и любом другом Linux.
  build-agent-linux-rpm:
    runs-on: ubuntu-latest
    env:
      RELEASE_DIR: release-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent-gui/requirements.txt

      - name: Build rpm binary (glibc 2.17, CentOS 7+)
        env:
          NOCKO_AGENT_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p ${{ env.RELEASE_DIR }}
          # manylinux2014 = CentOS 7 base (glibc 2.17).
          # Python in this image is built WITHOUT --enable-shared, so we must compile
          # our own Python 3.11 with --enable-shared.
          # Python 3.11 also requires OpenSSL >= 1.1.1, so we build that first.
          docker run --rm \
            -v "$PWD:/workspace" \
            -e NOCKO_AGENT_VERSION="${NOCKO_AGENT_VERSION}" \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash -c '
              set -e
              cd /tmp

              echo "=== Building OpenSSL 1.1.1w ==="
              yum install -y libffi-devel 2>/dev/null

              curl -sSL https://www.openssl.org/source/openssl-1.1.1w.tar.gz | tar xz
              cd openssl-1.1.1w
              ./config --prefix=/usr/local/openssl --openssldir=/usr/local/openssl shared zlib 2>/dev/null
              make -j$(nproc) 2>/dev/null && make install_sw 2>/dev/null
              export LD_LIBRARY_PATH=/usr/local/openssl/lib:$LD_LIBRARY_PATH

              echo "=== Building Python 3.11.9 with --enable-shared ==="
              cd /tmp
              curl -sSL https://www.python.org/ftp/python/3.11.9/Python-3.11.9.tgz | tar xz
              cd Python-3.11.9
              ./configure --enable-shared --prefix=/usr/local \
                --with-openssl=/usr/local/openssl \
                LDFLAGS="-Wl,-rpath,/usr/local/lib -Wl,-rpath,/usr/local/openssl/lib" \
                2>/dev/null
              make -j$(nproc) 2>/dev/null && make install 2>/dev/null
              PYTHON=/usr/local/bin/python3.11

              echo "=== Installing pip packages ==="
              $PYTHON -m pip install --upgrade pip --quiet
              $PYTHON -m pip install -r /workspace/agent-gui/requirements.txt pyinstaller --quiet

              echo "=== Building with PyInstaller ==="
              cd /workspace/agent-gui
              $PYTHON -m PyInstaller agent.spec --noconfirm
              mv dist/NOCKO-Agent /workspace/${{ env.RELEASE_DIR }}/nocko-agent-'"${NOCKO_AGENT_VERSION}"'-amd64-linux-rpm
              chmod +x /workspace/${{ env.RELEASE_DIR }}/nocko-agent-'"${NOCKO_AGENT_VERSION}"'-amd64-linux-rpm
            '

      - name: Show glibc requirement
        run: objdump -p ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux-rpm | grep GLIBC || true

      - name: Upload rpm asset
        uses: actions/upload-artifact@v4
        with:
          name: linux-asset-rpm
          path: ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux-rpm

  publish-release:
    needs: [build-agent-windows, build-agent-linux-deb, build-agent-linux-rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub release
        if: ${{ inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="agent-v${{ inputs.version }}"
          assets=$(find release-assets -type f)
          if [ -z "$assets" ]; then
            echo "No release assets were produced."
            exit 1
          fi

          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* \
              --title "Agent ${{ inputs.version }}" \
              --notes "Agent release ${{ inputs.version }}"
          fi

      - name: Update agent release manifest
        env:
          REPO: ${{ github.repository }}
        run: |
          generatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          tag="agent-v${{ inputs.version }}"
          ver="${{ inputs.version }}"

          args=(
            "scripts/update_agent_release_manifest.py"
            "--manifest" "backend/package_builder/agent_releases.json"
            "--repo" "$REPO"
            "--tag" "$tag"
            "--version" "$ver"
            "--generated-at" "$generatedAt"
          )

          [ -f "release-assets/nocko-agent-${ver}-x64-portable.exe" ] && \
            args+=("--asset" "exe:x64:release-assets/nocko-agent-${ver}-x64-portable.exe")

          [ -f "release-assets/nocko-agent-${ver}-amd64-linux-deb" ] && \
            args+=("--asset" "linux-deb:amd64:release-assets/nocko-agent-${ver}-amd64-linux-deb")

          [ -f "release-assets/nocko-agent-${ver}-amd64-linux-rpm" ] && \
            args+=("--asset" "linux-rpm:amd64:release-assets/nocko-agent-${ver}-amd64-linux-rpm")

          python "${args[@]}"

      - name: Commit updated manifest
        run: |
          if ! git diff --quiet -- backend/package_builder/agent_releases.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/package_builder/agent_releases.json
            git commit -m "Update agent release manifest for v${{ inputs.version }}"
            git pull --rebase origin main
            git push
          else
            echo "Manifest already up to date."
          fi

      - name: Trigger portal deploy
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }} --ref main

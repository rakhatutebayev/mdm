name: Build Windows Agent Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Agent version to release, for example 1.0.0
        required: true
      publish_release:
        description: Publish a GitHub release
        required: true
        default: "true"

permissions:
  contents: write
  actions: write

jobs:
  build-agent-windows:
    runs-on: windows-latest
    env:
      AGENT_DIR: agent-gui
      RELEASE_DIR: release-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate agent sources exist
        shell: pwsh
        run: |
          $required = @(
            "${env:AGENT_DIR}\main.py",
            "${env:AGENT_DIR}\agent.spec",
            "${env:AGENT_DIR}\make_icons.py"
          )
          $missing = @($required | Where-Object { -not (Test-Path $_) })
          if ($missing.Count -gt 0) {
            Write-Error "Agent source files are missing from the repository:`n$($missing -join "`n")"
            exit 1
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agent-gui/requirements.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-gui/requirements.txt

      - name: Prepare release directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${env:RELEASE_DIR}" | Out-Null

      - name: Build standalone agent executable
        shell: pwsh
        working-directory: agent-gui
        env:
          NOCKO_AGENT_VERSION: ${{ inputs.version }}
        run: |
          python make_icons.py
          pyinstaller agent.spec --noconfirm
          $builtExe = Join-Path $PWD "dist\NOCKO-Agent.exe"
          if (-not (Test-Path $builtExe)) {
            Write-Error "PyInstaller did not produce dist\NOCKO-Agent.exe"
            exit 1
          }
          Copy-Item $builtExe "..\${env:RELEASE_DIR}\nocko-agent-${{ inputs.version }}-x64-portable.exe"

      - name: List release assets
        shell: pwsh
        run: Get-ChildItem "${env:RELEASE_DIR}"

      - name: Upload Windows Asset
        uses: actions/upload-artifact@v4
        with:
          name: windows-asset
          path: ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-x64-portable.exe

  build-agent-linux:
    # manylinux2014_x86_64 = CentOS 7 base, glibc 2.17 — максимальная совместимость.
    # Python 3.11 предустановлен. git ставим через yum ДО checkout.
    # Совместимо с: CentOS 7/8, RHEL 7/8, Ubuntu 18.04+, Debian 9+
    runs-on: ubuntu-22.04
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    env:
      AGENT_DIR: agent-gui
      RELEASE_DIR: release-assets
      PYTHON: /opt/python/cp311-cp311/bin/python3.11
      PIP: /opt/python/cp311-cp311/bin/pip3.11
    steps:
      - name: Install git (required by actions/checkout)
        run: |
          yum install -y git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          $PIP install --upgrade pip
          $PIP install -r agent-gui/requirements.txt pyinstaller

      - name: Build Linux executable
        working-directory: agent-gui
        env:
          NOCKO_AGENT_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p ../${{ env.RELEASE_DIR }}
          $PYTHON -m PyInstaller agent.spec --noconfirm
          mv dist/NOCKO-Agent ../${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux
          echo "=== Binary glibc requirement ==="
          objdump -p ../${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux | grep GLIBC || true

      - name: Upload Linux Asset
        uses: actions/upload-artifact@v4
        with:
          name: linux-asset
          path: ${{ env.RELEASE_DIR }}/nocko-agent-${{ inputs.version }}-amd64-linux

  publish-release:
    needs: [build-agent-windows, build-agent-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows Asset
        uses: actions/download-artifact@v4
        with:
          name: windows-asset
          path: release-assets
      
      - name: Download Linux Asset
        uses: actions/download-artifact@v4
        with:
          name: linux-asset
          path: release-assets

      - name: Publish GitHub release
        if: ${{ inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="agent-v${{ inputs.version }}"
          assets=$(find release-assets -type f)
          if [ -z "$assets" ]; then
            echo "No release assets were produced."
            exit 1
          fi
          
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* --title "Agent ${{ inputs.version }}" --notes "Agent release ${{ inputs.version }}"
          fi

      - name: Update agent release manifest
        env:
          REPO: ${{ github.repository }}
        run: |
          generatedAt=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          tag="agent-v${{ inputs.version }}"
          
          args=(
            "scripts/update_agent_release_manifest.py"
            "--manifest" "backend/package_builder/agent_releases.json"
            "--repo" "$REPO"
            "--tag" "$tag"
            "--version" "${{ inputs.version }}"
            "--generated-at" "$generatedAt"
          )

          if [ -f "release-assets/nocko-agent-${{ inputs.version }}-x64-portable.exe" ]; then
            args+=("--asset" "exe:x64:release-assets/nocko-agent-${{ inputs.version }}-x64-portable.exe")
          fi
          
          if [ -f "release-assets/nocko-agent-${{ inputs.version }}-amd64-linux" ]; then
            args+=("--asset" "linux-binary:amd64:release-assets/nocko-agent-${{ inputs.version }}-amd64-linux")
          fi

          python "${args[@]}"

      - name: Commit updated manifest
        run: |
          if ! git diff --quiet -- backend/package_builder/agent_releases.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/package_builder/agent_releases.json
            git commit -m "Update agent release manifest for v${{ inputs.version }}"
            git push
          else
            echo "Manifest already up to date."
          fi

      - name: Trigger portal deploy
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }} --ref main
          echo "Portal deploy triggered for v${{ inputs.version }}"

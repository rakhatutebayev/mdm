name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to mdm.it-uae.com
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     22
          timeout:  25m
          script: |
            set -e
            cd /opt/nocko-mdm

            echo "=== Pulling latest code ==="
            git fetch origin
            git reset --hard origin/main

            echo "=== Building images (without stopping running containers) ==="
            docker compose build backend frontend

            echo "=== Rolling restart (backend first, then frontend) ==="
            docker compose up -d --no-deps backend
            sleep 5
            docker compose up -d --no-deps frontend

            echo "=== Cleanup old images ==="
            docker image prune -f --filter "dangling=true" || true

            echo "=== Health check ==="
            sleep 5
            curl -sf http://localhost:8000/health | grep '"status":"ok"' && echo "✅ Backend healthy"

            echo "=== Done ==="
            docker compose ps

      - name: ✅ Notify success
        if: success()
        run: |
          echo "✅ Deployed to https://mdm.it-uae.com"

      - name: ❌ Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check logs above."

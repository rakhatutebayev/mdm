name: Deploy to Production

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "==> Pulling latest code..."
            cd /opt/nocko-mdm
            git pull origin main || git pull origin master

            echo "==> Installing build tools (if missing)..."
            which nsis   || (apt-get update -q && apt-get install -y nsis)
            which wixl   || apt-get install -y msitools

            echo "==> Restarting services with Docker Compose..."
            docker compose pull
            docker compose up -d --build --remove-orphans

            echo "==> Running DB migrations (tables auto-created on startup)..."
            sleep 5
            docker compose exec -T backend python seed.py || true

            echo "==> Done! Services:"
            docker compose ps

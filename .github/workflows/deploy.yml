name: Deploy to Production

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     22
          script: |
            set -e
            echo "==> Setting server timezone to Asia/Dubai (UTC+4)..."
            timedatectl set-timezone Asia/Dubai || true

            echo "==> Pulling latest code..."
            cd /opt/nocko-mdm
            git pull origin main || git pull origin master

            echo "==> Refreshing Docker builder cache..."
            docker builder prune -af || true

            echo "==> Restarting application services with Docker Compose..."
            docker compose pull
            docker compose up -d --build --force-recreate --remove-orphans

            echo "==> Starting EMQX (MQTT broker)..."
            docker compose -f docker-compose.mqtt.yml up -d --remove-orphans || true

            echo "==> Configuring Nginx for MQTT over WebSocket (WSS /mqtt)..."
            NGINX_CONF=$(grep -rl "mdm.nocko.com" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | head -1 || true)
            if [ -z "$NGINX_CONF" ]; then
              NGINX_CONF=$(grep -rl "mdm.nocko.com" /etc/nginx/ 2>/dev/null | grep -v ".bak" | head -1 || true)
            fi
            echo "Nginx config found: ${NGINX_CONF:-not found}"
            if [ -n "$NGINX_CONF" ]; then
              python3 /opt/nocko-mdm/scripts/inject_nginx_mqtt.py "$NGINX_CONF" || true
            fi
            nginx -t && nginx -s reload || true

            echo "==> Refreshing seed data (tables auto-created on startup)..."
            sleep 5
            docker compose exec -T backend python seed.py || true

            echo "==> Done! Services:"
            docker compose ps
            echo "==> Server time: $(date)"

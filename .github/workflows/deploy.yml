name: Deploy to Production

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          port:     22
          script: |
            set -e
            echo "==> Setting server timezone to Asia/Dubai (UTC+4)..."
            timedatectl set-timezone Asia/Dubai || true

            echo "==> Pulling latest code..."
            cd /opt/nocko-mdm
            git pull origin main || git pull origin master

            echo "==> Restarting application services with Docker Compose..."
            docker compose down --remove-orphans || true
            docker compose pull
            docker compose up -d --build --force-recreate --remove-orphans

            echo "==> Refreshing seed data (tables auto-created on startup)..."
            sleep 5
            docker compose exec -T backend python seed.py || true

            echo "==> Done! Services:"
            docker compose ps
            echo "==> Server time: $(date)"

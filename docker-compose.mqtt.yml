# EMQX MQTT Broker — WSS (MQTT over WebSocket on port 443)
# Start: docker compose -f docker-compose.yml -f docker-compose.mqtt.yml up -d

version: "3.9"

services:
  emqx:
    image: emqx/emqx:5
    restart: unless-stopped
    environment:
      EMQX_NAME: nocko_mdm
      EMQX_ALLOW_ANONYMOUS: "true"
    ports:
      # Expose 8083 only to localhost — Nginx proxies /mqtt → 8083
      - "127.0.0.1:8083:8083"
    volumes:
      - emqxdata:/opt/emqx/data

  backend:
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "8083"
      MQTT_TRANSPORT: "websockets"
      MQTT_PATH: "/mqtt"

volumes:
  emqxdata:

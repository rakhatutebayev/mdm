# EMQX MQTT Broker — WSS (MQTT over WebSocket on port 443)
# Start: docker compose -f docker-compose.yml -f docker-compose.mqtt.yml up -d

services:
  emqx:
    image: emqx/emqx:5.8.6
    restart: unless-stopped
    environment:
      EMQX_NAME: nocko_mdm
      EMQX_ALLOW_ANONYMOUS: "${EMQX_ALLOW_ANONYMOUS:-false}"
      # Enable built-in password auth
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__USER_ID_TYPE: username
      EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__NAME: sha256
      EMQX_AUTHENTICATION__1__PASSWORD_HASH_ALGORITHM__SALT_POSITION: suffix
      # Dashboard password (change in production)
      EMQX_DASHBOARD__DEFAULT_PASSWORD: "${EMQX_DASHBOARD_PASSWORD:-changeme}"
    ports:
      # Expose 8083 only to localhost — Nginx proxies /mqtt → 8083
      - "127.0.0.1:8083:8083"
      # EMQX dashboard (localhost only — do NOT expose publicly)
      - "127.0.0.1:18083:18083"
    volumes:
      - emqxdata:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  # One-shot service: waits for EMQX, creates the MQTT user for backend + agents
  emqx-setup:
    image: curlimages/curl:8.7.1
    restart: "no"
    depends_on:
      emqx:
        condition: service_healthy
    environment:
      EMQX_DASHBOARD_PASSWORD: "${EMQX_DASHBOARD_PASSWORD:-changeme}"
      MQTT_USERNAME: "${MQTT_USERNAME}"
      MQTT_PASSWORD: "${MQTT_PASSWORD}"
    entrypoint:
      - sh
      - -c
      - |
        echo "Creating MQTT user '${MQTT_USERNAME}'..."
        curl -sf -X POST http://emqx:18083/api/v5/authentication/password_based:built_in_database/users \
          -H "Content-Type: application/json" \
          -u "admin:${EMQX_DASHBOARD_PASSWORD}" \
          -d "{\"user_id\": \"${MQTT_USERNAME}\", \"password\": \"${MQTT_PASSWORD}\", \"is_superuser\": true}" \
          && echo "MQTT user created." \
          || echo "User may already exist — skipping."

  backend:
    environment:
      # In-cluster: backend → EMQX MQTT over WebSocket (listener 8083, path /mqtt)
      MQTT_HOST: emqx
      MQTT_PORT: "8083"
      MQTT_TRANSPORT: "websockets"
      MQTT_PATH: "/mqtt"
      MQTT_USERNAME: "${MQTT_USERNAME}"
      MQTT_PASSWORD: "${MQTT_PASSWORD}"
      # Agents get wss://<MDM_SERVER_URL host>/mqtt (443) from MQTT_TRANSPORT + MDM_SERVER_URL

volumes:
  emqxdata:
